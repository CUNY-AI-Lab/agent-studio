name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_AUTH_TOKEN: ${{ secrets.CAIL_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (import boundary)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

  smoke-worker:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    env:
      NODE_AUTH_TOKEN: ${{ secrets.CAIL_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write CI dev vars
        run: |
          cat > cloudflare/.dev.vars <<'EOF'
          SESSION_SECRET=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          CAIL_LOG_ENV=development
          CAIL_API_BASE=https://cail-model-proxy.invalid
          CAIL_MODEL=@cf/zai-org/glm-5.2
          CAIL_IDENTITY_ISSUER=https://tools.ailab.gc.cuny.edu/cail-sso
          CAIL_IDENTITY_JWKS=
          CAIL_REQUIRE_IDENTITY=false
          CAIL_BASE_PATH=/
          EOF

      - name: Start worker and run smoke test
        run: |
          set -euo pipefail

          cleanup() {
            if [[ -f /tmp/agent-studio-dev.pid ]]; then
              kill "$(cat /tmp/agent-studio-dev.pid)" >/dev/null 2>&1 || true
            fi
          }

          trap cleanup EXIT

          bun run dev >/tmp/agent-studio-dev.log 2>&1 &
          echo $! > /tmp/agent-studio-dev.pid

          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:8787/health >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://127.0.0.1:8787/health >/dev/null; then
            cat /tmp/agent-studio-dev.log
            exit 1
          fi

          bun run smoke -- --base-url http://127.0.0.1:8787
